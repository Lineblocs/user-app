<!-- exact table from live demo -->
<div>
  <div ng-show="users.length === 0" class="no-results">
    <md-card md-theme="'default'"" md-theme-watch>
      <div ng-show="users.length === 0 && !pagination.didSearch" class="no-results">
      <div class="inner">
        <center>
          <md-button ng-click="createUser()" class="md-raised md-primary">Add user</md-button>
        </center>
      </div>
      </div>
    </md-card>
  </div>
  <div ng-show="users.length > 0">
            <div layout="row side-options" layout-align="end center">
                <div>
            <md-button ng-click="createUser()" class="md-raised md-primary create-new">Add User</md-button>
                </div>
                <div>
                    <md-menu md-position-mode="target-right target">
                        <div class="nav-item">
                            <md-button aria-label="Open demo menu" class="md-raised md-primary bulk-actions"
                                ng-click="$mdOpenMenu($event)">
                                Actions
                                <i class="mdi mdi-chevron-down" ng-class="{'active': showingSubNav=='ui'}"></i>
                            </md-button>
                        </div>
                        <md-menu-content width="3">
                            <md-menu-item>
                                <md-button href="" ng-click="Backend.deleteAllChecked('workspaceUsers', users)"
                                    style="display:flex;">
                                    Delete All</md-button>
                            </md-menu-item>
                        </md-menu-content>
                    </md-menu>
                </div>
            </div>
  <md-card md-theme="'default'"" md-theme-watch>
    <md-table-container>
      <table md-table md-row-select multiple ng-model="selected" md-progress="promise">
        <thead md-head md-order="query.order" md-on-reorder="getDesserts">
          <tr md-row>
            <th md-column></th>
            <th md-column><span>Email</span></th>
            <th md-column style="text-align: right;"><span></span></th>
            <th md-column style="text-align: right;"><span></span></th>
            <th md-column style="text-align: right;"></th>
          </tr>
        </thead>
        <tbody md-body>
          <tr md-row md-select="user" md-select-id="email" md-auto-select ng-repeat="user in users">
                    <td md-cell>
                        <md-checkbox ng-model="user.checked" aria-label="Checkbox" class="md-warn md-align-top-left" flex></md-checkbox>
                    </td>
            <td md-cell>{{user.email}}</td>
            <td md-cell style="text-align: right; display: flex; align-items: center; gap: 0;">
              <span ng-if="user.status === 'ACTIVE'" style="display: flex; align-items: center; gap: 4px;">
                <i class="mdi mdi-check-circle"></i>
                active
              </span>
              <span ng-if="user.status === 'DEACTIVATED'" style="display: flex; align-items: center; gap: 4px;">
                <i class="mdi mdi-block-helper"></i>
                deactivated
              </span>
              <span ng-if="user.status === 'INVITED'" style="display: flex; align-items: center; gap: 4px;">
                <i class="mdi mdi-clock-outline"></i>
                invited
              </span>
              <i ng-show="user.status === 'INVITED'" class="mdi mdi-email" ng-click="resendInvite(user)" style="margin-left: 4px; cursor: pointer; font-size: 24px; color: blue;" aria-label="Reinvite user">
                <md-tooltip class="helper-tooltip" md-direction="top">Resend invite</md-tooltip>
              </i>
            </td>
            <td md-cell style="text-align: right;">
              <md-button ng-click="editUser($event, user)" class="md-icon-button" aria-label="Edit">
                <md-icon><i class="mdi mdi-pencil"></i></md-icon>
                <md-tooltip class="helper-tooltip" md-direction="top">Edit workspace user</md-tooltip>
              </md-button>
            </td>
            <td md-cell style="text-align: right;">
              <md-menu md-position-mode="target-left bottom">
                <md-button ng-click="$mdOpenMenu($event)" class="md-icon-button" aria-label="More options">
                  <md-icon><i class="mdi mdi-dots-vertical"></i></md-icon>
                </md-button>
                <md-menu-content width="3">
                  <md-menu-item ng-show="user.status === 'ACTIVE'">
                    <md-button ng-click="deactivateAccount($event, user)">Deactivate Account</md-button>
                  </md-menu-item>
                  <md-menu-item ng-show="user.status === 'DEACTIVATED'">
                    <md-button ng-click="reactivateAccount($event, user)">Reactivate Account</md-button>
                  </md-menu-item>
                  <md-menu-item>
                    <md-button ng-click="changeAccountType($event, user)">Change Account Type</md-button>
                  </md-menu-item>
                </md-menu-content>
              </md-menu>
            </td>
          </tr>
        </tbody>
      </table>
    </md-table-container>
  </md-card>
</div>
  </div>
