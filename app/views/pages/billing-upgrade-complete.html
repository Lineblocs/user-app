<div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <md-card md-theme="'default'" md-theme-watch style="max-width: 500px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
        <md-card-content>
            <md-content style="text-align: center; padding: 40px 20px;">
            <h2 style="color: #fff; margin-top: 0; font-size: 32px; margin-bottom: 20px;">⏳ Upgrade Pending</h2>
            <p style="color: #fff; font-size: 18px; margin-bottom: 40px; line-height: 1.6;">
                Your upgrade to <strong>{{plan.nice_name}}</strong> is being processed.
            </p>
            <p style="color: #fff; font-size: 16px; margin-bottom: 40px; line-height: 1.6;">
                We will notify you via email when the upgrade is complete. This process may take up to 5 minutes.
            </p>

        <md-button type="button" ng-click="gotoDashboard()"
            class="md-raised md-primary" style="margin-top: 20px; padding: 12px 40px; font-size: 16px;">
            Back to Dashboard</md-button>
            </md-content>
        </md-card-content>
    </md-card>
</div>
